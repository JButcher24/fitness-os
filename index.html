<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>CLIVE</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CLIVE">
<meta name="application-name" content="CLIVE">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png?v=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============ Design tokens (DetailBook dark surface, resolved) ============ */
  :root {
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Roboto, sans-serif;
    --font-mono: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
    --navy-950: #0F172A; --navy-900: #111C32; --navy-850: #18233D; --navy-800: #1E293B; --navy-700: #334155;
    --slate-600: #475569; --slate-500: #64748B; --slate-400: #94A3B8; --slate-50: #F8FAFC;
    --surface-card: var(--navy-800); --surface-raised: var(--navy-850); --surface-sunken: var(--navy-900); --surface-hover: var(--navy-700);
    --text-strong: var(--slate-50); --text-body: #E8EDF5; --text-secondary: var(--slate-400); --text-muted: var(--slate-500);
    --border-subtle: var(--navy-800); --border-default: var(--navy-700);
    --brand: #818CF8; --brand-tint: rgba(129,140,248,0.14);
    --indigo-400: #818CF8; --violet: #8B5CF6; --emerald: #34D399;
    --gradient: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
    --success-soft: rgba(52,211,153,0.14); --success-text: #6EE7B7;
    --warning: #FBBF24; --danger: #F87171; --info: #60A5FA;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.30);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.40), 0 1px 2px rgba(0,0,0,0.30);
    --shadow-md: 0 6px 18px rgba(0,0,0,0.45);
    --shadow-lg: 0 16px 40px rgba(0,0,0,0.50);
    --shadow-brand: 0 8px 28px rgba(99,102,241,0.38);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html, body { margin: 0; padding: 0; background: #0F172A; }
  * { box-sizing: border-box; }
  body {
    font-family: var(--font-sans); color: var(--text-body); min-height: 100vh;
    background:
      radial-gradient(ellipse at top left, rgba(99,102,241,0.12) 0%, transparent 52%),
      radial-gradient(ellipse at bottom right, rgba(139,92,246,0.10) 0%, transparent 55%),
      linear-gradient(180deg, #0F172A 0%, #16213B 50%, #0F172A 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
  }
  a { color: #818CF8; text-decoration: none; }
  a:hover { color: #A5B4FC; }
  ::selection { background: rgba(99,102,241,0.35); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; border: 2px solid #0F172A; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes db-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* ============ Shell ============ */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 236px; flex-shrink: 0; border-right: 1px solid var(--border-subtle);
    background: rgba(15,23,42,0.55); display: flex; flex-direction: column;
    padding: 20px 14px 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100;
  }
  .logo-row { display: flex; align-items: center; gap: 10px; padding: 2px 8px 20px; }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px; background: var(--gradient); overflow: hidden;
    display: inline-flex; align-items: center; justify-content: center; box-shadow: var(--shadow-brand); flex-shrink: 0;
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.4); transform-origin: 50% 26%; display: block; }
  .logo-name { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-strong); line-height: 1.15; }
  .logo-sub { font-size: 10.5px; font-weight: 600; color: var(--slate-500); letter-spacing: 0.04em; }
  .nav-group { margin-bottom: 16px; }
  .nav-group-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate-500); padding: 0 12px 7px; }
  .nav-items { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 8px 12px; border-radius: 10px;
    font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; cursor: pointer; user-select: none;
    color: var(--text-secondary); background: transparent; min-height: 36px;
    transition: all 0.15s var(--ease-out);
  }
  .nav-item:hover { color: var(--text-strong); background: rgba(51,65,85,0.35); }
  .nav-item.active { color: #fff; background: var(--gradient); box-shadow: var(--shadow-brand); }
  .nav-item svg { opacity: 0.9; flex-shrink: 0; }
  .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }
  .kbd-hint { font-size: 11px; color: var(--slate-500); padding: 0 8px; line-height: 1.5; }
  .kbd { font-family: var(--font-mono); background: var(--navy-800); border: 1px solid var(--navy-700); border-radius: 5px; padding: 1px 5px; font-size: 10px; }
  .me-row { display: flex; align-items: center; gap: 10px; padding: 8px 8px 0; border-top: 1px solid var(--border-subtle); }

  .avatar {
    border-radius: 50%; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
    overflow: hidden; font-family: var(--font-sans); font-weight: 700; letter-spacing: 0.01em; color: #fff;
    background: var(--gradient); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12); user-select: none;
  }

  main { flex: 1; min-width: 0; padding: 26px 32px 56px; max-width: 1440px; }

  /* ============ Topbar (mobile) ============ */
  .topbar { display: none; }
  .backdrop { display: none; }

  /* ============ Cards / components ============ */
  .card {
    background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 16px;
    padding: 20px; box-shadow: var(--shadow-sm); color: var(--text-body); min-width: 0;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 36px; padding: 0 14px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600; letter-spacing: -0.01em; line-height: 1;
    border-radius: 8px; border: 1.5px solid transparent; cursor: pointer; white-space: nowrap;
    transition: transform 0.15s var(--ease-out), box-shadow 0.25s var(--ease-out), filter 0.25s var(--ease-out);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0) scale(0.985); }
  .btn-primary { color: #fff; background: var(--gradient); box-shadow: var(--shadow-brand); }
  .btn-primary:hover { filter: brightness(1.04); }
  .btn-secondary { color: var(--text-strong); background: var(--surface-card); border-color: var(--border-default); box-shadow: var(--shadow-xs); }
  .pill {
    display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; line-height: 1;
    padding: 4px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
  }
  .t-brand { background: var(--brand-tint); color: var(--brand); }
  .t-success { background: var(--success-soft); color: var(--success-text); }
  .t-warn { background: rgba(245,158,11,0.14); color: var(--warning); }
  .t-info { background: rgba(59,130,246,0.13); color: var(--info); }

  .card-title { font-size: 14.5px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; }
  .card-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
  .stat-num { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-strong); line-height: 1.1; }
  .stat-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; }
  .stat-note { display: flex; align-items: center; gap: 5px; margin-top: 8px; font-size: 12.5px; font-weight: 600; }
  .link { font-size: 12px; font-weight: 600; color: var(--brand); cursor: pointer; white-space: nowrap; }
  .bar { height: 6px; border-radius: 999px; background: var(--navy-700); overflow: hidden; }
  .bar > div { height: 100%; border-radius: 999px; background: var(--gradient); }
  .tile { background: var(--surface-sunken); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 12px 14px; }
  .tile-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .tile-num { font-size: 19px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.02em; margin-top: 3px; }
  .tile-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
  .quote {
    font-size: 12.5px; line-height: 1.6; color: var(--text-body); background: var(--surface-sunken);
    border: 1px solid var(--border-subtle); border-radius: 12px; padding: 12px 14px;
  }
  .quote .sig { display: block; margin-top: 6px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .kv { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--text-secondary); }
  .kv .v { font-weight: 700; color: var(--text-strong); font-family: var(--font-mono); text-align: right; }
  .empty-box {
    border: 1px dashed var(--navy-700); border-radius: 12px; padding: 24px; text-align: center;
    color: var(--slate-500); font-size: 12.5px; background: rgba(30,41,59,0.4);
  }

  /* ============ Page header ============ */
  .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  .page-head h1 { margin: 0 0 4px; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-strong); }
  .page-head .sub { font-size: 13.5px; color: var(--text-secondary); }
  .head-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .live-pill {
    display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600;
    color: var(--brand); background: var(--brand-tint); border-radius: 999px; padding: 6px 12px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--indigo-400); animation: db-pulse 1.8s ease-in-out infinite; }

  /* ============ Grids ============ */
  .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .main-rail { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 18px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .rail { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .charts-2 { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr); gap: 18px; }
  .fuel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
  .totals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px 18px; }
  .stats-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .split-2 { display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr); gap: 18px; align-items: start; }
  .strength-2 { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr); gap: 18px; margin-bottom: 18px; align-items: stretch; }
  .ex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }

  .session-row { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border-subtle); }
  .session-row:last-child { border-bottom: none; }
  .session-num {
    width: 38px; height: 38px; border-radius: 10px; background: var(--surface-sunken); border: 1px solid var(--border-subtle);
    display: inline-flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 800;
    color: var(--text-secondary); font-family: var(--font-mono); flex-shrink: 0;
  }
  .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; min-height: 44px; }
  .tick {
    width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; font-size: 11px; font-weight: 800;
  }
  .tick.done { background: var(--success-soft); color: var(--success-text); border: 1px solid rgba(52,211,153,0.4); }
  .tick.todo { background: transparent; color: transparent; border: 1.5px solid var(--navy-700); }
  .pb-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .pb-row:last-child { border-bottom: none; }
  .ms-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border-subtle); }
  .ms-row:last-child { border-bottom: none; }
  .ms-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 800; }

  .legend { display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
  .legend .sw { width: 10px; height: 2.5px; border-radius: 2px; display: inline-block; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .chart-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }

  .chartwrap { position: relative; width: 100%; }
  .chartwrap svg { width: 100%; height: auto; display: block; overflow: visible; font-family: inherit; cursor: crosshair; }
  .chart-tip {
    position: absolute; top: 0; background: #18233D; border: 1px solid #334155; border-radius: 8px; padding: 7px 10px;
    font-size: 11.5px; pointer-events: none; box-shadow: 0 6px 18px rgba(0,0,0,0.45); white-space: nowrap; z-index: 5; display: none;
  }
  .chart-tip .tl { font-weight: 700; color: #F8FAFC; margin-bottom: 3px; }
  .chart-tip .tr { display: flex; align-items: center; gap: 6px; color: #94A3B8; }
  .chart-tip .tr .sw { width: 8px; height: 2.5px; border-radius: 2px; display: inline-block; }
  .chart-tip .tr b { color: #E8EDF5; font-weight: 600; }

  .ex-card {
    background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 18px 20px;
    box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 12px; min-width: 0;
  }
  .coach-next { font-size: 12px; line-height: 1.55; color: var(--text-body); background: var(--surface-sunken); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 9px 12px; }
  .coach-next b { font-weight: 700; color: var(--brand); }

  .timeline { max-width: 780px; position: relative; padding-left: 26px; }
  .timeline-bar { position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--navy-700); border-radius: 2px; }
  .note-wrap { position: relative; margin-bottom: 22px; }
  .note-node { position: absolute; left: -26px; top: 20px; width: 14px; height: 14px; border-radius: 50%; background: var(--navy-800); border: 2px solid var(--navy-700); }
  .note-node.live { background: var(--gradient); border: none; box-shadow: var(--shadow-brand); }
  .note-card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 18px 22px; box-shadow: var(--shadow-sm); }
  .note-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .note-id { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--brand); background: var(--brand-tint); border-radius: 6px; padding: 3px 8px; }
  .note-title { font-size: 14.5px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; }
  .note-date { font-size: 11.5px; color: var(--text-muted); margin-left: auto; }
  .note-line { font-size: 13px; line-height: 1.65; color: var(--text-body); padding: 3px 0 3px 14px; border-left: 2px solid var(--navy-700); margin: 6px 0; }
  .note-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }

  .placeholder-wrap { display: flex; align-items: center; justify-content: center; min-height: 70vh; }
  .placeholder-card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 44px 52px; box-shadow: var(--shadow-md); text-align: center; max-width: 460px; }
  .ph-icon { width: 48px; height: 48px; border-radius: 14px; background: var(--brand-tint); color: var(--brand); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; }

  .warn-box {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11.5px; font-weight: 600;
    color: var(--warning); background: rgba(245,158,11,0.14); border-radius: 8px; padding: 7px 10px; line-height: 1.45;
  }
  .ok-box {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11.5px; font-weight: 600;
    color: var(--success-text); background: var(--success-soft); border-radius: 8px; padding: 7px 10px; line-height: 1.45;
  }

  .exlist-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); }
  .exlist-row:last-child { border-bottom: none; }

  /* ============ Responsive ============ */
  @media (max-width: 1180px) {
    .main-rail { grid-template-columns: 1fr; }
    .charts-2 { grid-template-columns: 1fr; }
    .strength-2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 900px) {
    .split-2 { grid-template-columns: 1fr; }
    main { padding: 18px 16px 90px; }
    .topbar {
      display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 300;
      background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--navy-800);
      padding: 10px 12px;
    }
    .burger {
      width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--navy-700); background: rgba(30,41,59,0.6);
      color: var(--text-strong); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; height: 100dvh; transform: translateX(-105%);
      transition: transform 0.25s var(--ease-out); z-index: 500; background: #101A30; box-shadow: var(--shadow-lg); width: 260px;
    }
    body.nav-open .sidebar { transform: translateX(0); }
    .backdrop { position: fixed; inset: 0; background: rgba(2,6,18,0.6); z-index: 400; }
    body.nav-open .backdrop { display: block; }
    .nav-item { min-height: 44px; }
    .kbd-hint { display: none; }
    .page-head h1 { font-size: 21px; }
    .ex-grid { grid-template-columns: 1fr; }
    .placeholder-card { padding: 32px 24px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <button class="burger" id="burger" aria-label="Open menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span style="display:inline-flex;align-items:center;gap:8px;">
    <span class="logo-mark" style="width:44px;height:44px;border-radius:10px;">
      <img src="assets/clive.png?v=1" alt="Clive">
    </span>
    <span class="logo-name">CLIVE</span>
  </span>
</div>
<div class="backdrop" id="backdrop"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main id="main"></main>
</div>
<noscript><div style="padding:40px;font-family:sans-serif;color:#E8EDF5;">CLIVE needs JavaScript — it computes everything from fitness-data.json in your browser.</div></noscript>

<script>
'use strict';
/* ============================================================
   Fitness OS — single-file dashboard.
   Everything displayed is computed at load time from
   fitness-data.json. Nothing display-worthy is hard-coded.
   ============================================================ */

// ---------- generic helpers ----------
const LB_PER_KG = 2.20462;
const DAY = 86400000;
const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const parseD = (iso) => { const [y, m, d] = String(iso).split('-').map(Number); return new Date(y, m - 1, d); };
const daysBetween = (a, b) => Math.round((b - a) / DAY);
const addDays = (d, n) => new Date(d.getTime() + n * DAY);
const fmtInt = (n) => Math.round(n).toLocaleString('en-GB');
const fmtLb = (lb, dp) => (lb == null ? '—' : lb.toFixed(dp == null ? 1 : dp) + ' lb');
const stoneTxt = (lb) => Math.floor(lb / 14) + ' st ' + (lb - Math.floor(lb / 14) * 14).toFixed(1);
const kgTxt = (lb) => (lb / LB_PER_KG).toFixed(1) + ' kg';

function sparkHTML(hist, color) {
  const w = 260, h = 34;
  if (!hist.length) return '<div style="height:' + h + 'px;border-radius:8px;background:rgba(30,41,59,0.6);border:1px dashed #334155;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#64748B;">no data yet</div>';
  const data = hist.map((x) => x.weightKg);
  let min = Math.min.apply(null, data), max = Math.max.apply(null, data);
  if (min === max) { min -= 1; max += 1; }
  const X = (i) => 6 + (data.length === 1 ? (w - 12) / 2 : (i * (w - 12)) / (data.length - 1));
  const Y = (v) => 5 + ((max - v) * (h - 10)) / (max - min);
  const dd = data.map((v, i) => (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ');
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:' + h + 'px;display:block;" preserveAspectRatio="none">' +
    '<path d="' + dd + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="' + X(data.length - 1).toFixed(1) + '" cy="' + Y(data[data.length - 1]).toFixed(1) + '" r="3.2" fill="' + color + '"/></svg>';
}

function sessionRowHTML(s, D) {

  const pbs = D.pbEvents.filter((p) => daysBetween(p.date, dt) === 0).length;
  const stats = inProg
    ? exs.length + ' lifts logged · ' + sets + ' sets so far' + (pbs ? ' · ' + pbs + ' PB' + (pbs > 1 ? 's' : '') : '')
    : (s.durationMin != null ? s.durationMin + ' min' : sets + ' sets') + (s.kcalBurned != null ? ' · ' + fmtInt(s.kcalBurned) + ' kcal' : '') + (s.avgHr != null ? ' · avg HR ' + s.avgHr : '');

}

// ---------- charts built from derived data ----------
function weightChart(D, opts) {
  const wis = D.weighIns.slice(-(opts.points || 10));
  const off = D.weighIns.length - wis.length;
  const labels = wis.map((w) => fmtDate(parseD(w.date)));
  const series = [
    { name: 'Weight', data: wis.map((w) => w.weightLb), color: '#818CF8', width: 2.2, area: true, dots: true },
    { name: '7-day avg', data: wis.map((_, i) => D.ma[off + i]), color: '#34D399', width: 1.8, dash: '5 4' },
  ];
  const vals = wis.map((w) => w.weightLb);
  const span = vals.length ? Math.max.apply(null, vals) - Math.min.apply(null, vals) : 0;
  const yFmt = span < 4 ? ((v) => v.toFixed(1)) : ((v) => Math.round(v));
  return chartHTML({ w: opts.w, h: opts.h, labels, series, fmt: (v) => v.toFixed(1) + ' lb', yFmt, xEvery: opts.xEvery || Math.max(1, Math.ceil(labels.length / 6)) });
}
function projectionChart(D) {
  if (!D.weighIns.length || D.goalW == null) return chartHTML({ labels: [], series: [] });
  const labels = [fmtDate(D.startDate)];
  const actual = [D.startW];
  const proj = [null];
  if (D.lastWeighDate && daysBetween(D.startDate, D.lastWeighDate) > 0) {
    labels.push(fmtDate(D.lastWeighDate)); actual.push(D.curW); proj.push(D.curW);
  }
  if (D.goalDate) {
    let m = new Date(D.lastWeighDate.getFullYear(), D.lastWeighDate.getMonth() + 1, 1);
    let guard = 0;
    while (m < D.goalDate && guard++ < 18) {
      labels.push(fmtDate(m, { month: 'short' }));
      actual.push(null);
      proj.push(Math.max(D.goalW, D.curW - D.ratePerDay * daysBetween(D.lastWeighDate, m)));
      m = new Date(m.getFullYear(), m.getMonth() + 1, 1);
    }
    labels.push(fmtDate(D.goalDate)); actual.push(null); proj.push(D.goalW);
  }
  const series = [
    { name: 'Actual', data: actual, color: '#818CF8', width: 2.4, dots: true },
    { name: 'Projection', data: proj, color: '#8B5CF6', width: 2, dash: '6 5', dots: true },
    { name: 'Goal', data: labels.map(() => D.goalW), color: '#475569', width: 1.4, dash: '3 5', quiet: true },
  ];
  return chartHTML({ w: 980, h: 280, labels, series, fmt: (v) => v.toFixed(1) + ' lb' });
}
function strengthChart(D, w, h) {
  const labels = [], data = [];
  D.sessions.forEach((s, i) => {
    if (D.strengthIdx[i] == null) return;
    labels.push('#' + s.id + ' · ' + fmtDate(parseD(s.date)));
    data.push(D.strengthIdx[i]);
  });
  return chartHTML({
    w, h, labels,
    series: [{ name: 'Index', data, color: '#34D399', width: 2.4, area: true, dots: true }],
    fmt: (v) => String(Math.round(v)), yFmt: (v) => Math.round(v),
  });
}

function screenWorkout(D) {
  const s = D.inProgress || (D.sessions.length ? D.sessions[D.sessions.length - 1] : null);

  const exs = (s.exercises || []);
  const rows = exs.map((e) => {
    const vol = (e.weightKg || 0) * (e.sets || []).reduce((a, b) => a + b, 0);
    const isPB = D.pbEvents.some((p) => p.name === e.name && daysBetween(p.date, parseD(s.date)) === 0 && p.weightKg === e.weightKg);
    return '<div class="exlist-row"><div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:700;color:var(--text-strong);">' + esc(e.name) + (isPB ? ' <span class="pill t-success" style="margin-left:6px;">PB</span>' : '') + '</div>' +
      '<div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">' + esc((e.sets || []).join(' / ') + ' reps · ' + fmtInt(vol) + ' kg volume') + '</div></div>' +
      '<span style="font-size:15px;font-weight:800;color:var(--text-strong);font-family:var(--font-mono);white-space:nowrap;">' + esc(e.weightKg + ' kg') + '</span></div>';
  }).join('') || '<div class="empty-box">No lifts logged in this session yet</div>';
  const sets = exs.reduce((a, e) => a + (e.sets || []).length, 0);
  const reps = exs.reduce((a, e) => a + (e.sets || []).reduce((x, y) => x + y, 0), 0);
  const vol = exs.reduce((a, e) => a + (e.weightKg || 0) * (e.sets || []).reduce((x, y) => x + y, 0), 0);
  return '<div class="page-head"><div><h1>Workout</h1><div class="sub">Session #' + esc(s.id) + ' · ' + esc(s.type || '') + ' · ' + esc(fmtDate(parseD(s.date), { weekday: 'long', day: 'numeric', month: 'long' })) + (s.fasted ? ' · fasted' : '') + '</div></div>' +
    '<div class="head-actions">' + (s.status === 'in-progress' ? '<span class="live-pill"><span class="live-dot"></span>In progress</span>' : '<span class="pill t-success">Complete</span>') + '</div></div>' +
    '<div class="split-2"><div class="card">' + rows + '</div>' +
    '<div class="col"><div class="card"><div class="card-title" style="margin-bottom:14px;">This session</div>' +
    '<div class="kv"><span class="k">Sets</span><span class="v">' + sets + '</span></div>' +
    '<div class="kv"><span class="k">Reps</span><span class="v">' + reps + '</span></div>' +
    '<div class="kv"><span class="k">Volume</span><span class="v">' + fmtInt(vol) + ' kg</span></div>' +
    (s.avgHr != null ? '<div class="kv"><span class="k">Avg HR</span><span class="v">' + s.avgHr + ' bpm</span></div>' : '') +
    (s.durationMin != null ? '<div class="kv"><span class="k">Duration</span><span class="v">' + s.durationMin + ' min</span></div>' : '') + '</div>' +
    (D.progression.rule ? '<div class="card"><div class="card-title" style="margin-bottom:10px;">The progression rule</div><div style="font-size:13px;line-height:1.7;color:var(--text-body);">' + esc(D.progression.rule) + '</div></div>' : '') +
    '</div></div>';
}

  return '<div class="page-head"><div><h1>Goals</h1><div class="sub">The target, the pocket, and the road there</div></div></div>' +
    '<div class="stats-4">' +
    '<div class="card"><div class="stat-label">Start</div><div class="stat-num" style="font-size:26px;">' + esc(fmtLb(D.startW)) + '</div><div class="stat-sub">' + esc(fmtDate(D.startDate, { day: 'numeric', month: 'long', year: 'numeric' })) + '</div></div>' +
    '<div class="card"><div class="stat-label">Goal</div><div class="stat-num" style="font-size:26px;">' + esc(fmtLb(D.goalW, 0)) + '</div><div class="stat-sub">' + (D.goalW != null ? esc(stoneTxt(D.goalW)) : '—') + '</div></div>' +
    '<div class="card"><div class="stat-label">Target rate</div><div class="stat-num" style="font-size:26px;">' + esc(D.pocket[0] + '–' + D.pocket[1] + ' lb/wk') + '</div><div class="stat-sub">currently ' + esc(D.rateTxt) + '</div></div>' +
    '<div class="card"><div class="stat-label">Arrival</div><div class="stat-num" style="font-size:26px;">' + (D.goalDate ? esc(fmtDate(D.goalDate, { day: 'numeric', month: 'short', year: 'numeric' })) : '—') + '</div><div class="stat-sub">' + (D.goalWeeks != null ? '≈ ' + D.goalWeeks + ' weeks away' : 'projection needs a trend') + '</div></div>' +
    '</div><div class="card"><div class="card-title" style="margin-bottom:6px;">Milestones</div>' + milestonesHTML(D) + '</div>';
}
function screenSettings(D) {
  return '<div class="page-head"><div><h1>Settings</h1><div class="sub">There is no settings panel — the JSON is the settings</div></div></div>' +
    '<div class="split-2"><div class="card"><div class="card-title" style="margin-bottom:10px;">How this thing works</div>' +
    '<div style="font-size:13px;line-height:1.75;color:var(--text-body);">Everything on every screen is computed from <span style="font-family:var(--font-mono);color:var(--brand);">fitness-data.json</span> when the page loads. To change a target, a rule or fix a typo: edit the file, push, refresh. To log training or weigh-ins, tell Clive in plain English and he does it for you. The workflow lives in the repo README.</div></div>' +
    '<div class="card"><div class="card-title" style="margin-bottom:14px;">Current configuration</div>' +
    (D.progression.repTarget ? '<div class="kv"><span class="k">Rep target</span><span class="v">' + esc(D.progression.repTarget) + '</span></div>' : '') +
    (D.progression.incrementKg != null ? '<div class="kv"><span class="k">Progression increment</span><span class="v">+' + esc(D.progression.incrementKg) + ' kg</span></div>' : '') +
    (D.planned.sessionsPerBlock != null ? '<div class="kv"><span class="k">Sessions per block</span><span class="v">' + esc(D.planned.sessionsPerBlock) + '</span></div>' : '') +
    (D.planned.maxDaysBetweenSessions != null ? '<div class="kv"><span class="k">Max days between sessions</span><span class="v">' + esc(D.planned.maxDaysBetweenSessions) + '</span></div>' : '') +
    '<div class="kv"><span class="k">Weight-loss pocket</span><span class="v">' + esc(D.pocket[0] + '–' + D.pocket[1] + ' lb/wk') + '</span></div>' +
    '</div></div>';
}
function screenPlaceholder(title) {
  return '<div class="placeholder-wrap"><div class="placeholder-card">' +
    '<span class="ph-icon">' + icon('clock', 22) + '</span>' +
    '<div style="font-size:20px;font-weight:800;letter-spacing:-0.02em;color:var(--text-strong);margin-bottom:8px;">' + esc(title) + '</div>' +
    '<div style="font-size:13.5px;line-height:1.65;color:var(--text-secondary);">Not designed yet — this screen lands in the next iteration.</div>' +
    '<div class="link" style="margin-top:18px;font-size:13px;" data-nav="dashboard">← Back to dashboard</div></div></div>';
}

// ---------- shell / router ----------
const NAV = [
  { title: 'Overview', items: [['dashboard', 'Dashboard', 'grid'], ['checkin', "Today's check-in", 'check']] },
  { title: 'Training', items: [['workout', 'Workout', 'activity'], ['history', 'Workout history', 'clock'], ['library', 'Exercise library', 'book']] },
  { title: 'Progress', items: [['weight', 'Weight', 'down'], ['strength', 'Strength', 'up'], ['measurements', 'Measurements', 'sliders'], ['nutrition', 'Nutrition', 'pie']] },
  { title: 'Coach', items: [['coach', 'Coach notes', 'msg'], ['achievements', 'Achievements', 'award'], ['goals', 'Goals', 'target'], ['settings', 'Settings', 'cog']] },
];
const SCREENS = {
  dashboard: screenDashboard, weight: screenWeight, strength: screenStrength, coach: screenCoach,
  checkin: screenCheckin, workout: screenWorkout, history: screenHistory, library: screenLibrary,
  nutrition: screenNutrition, measurements: screenMeasurements, achievements: screenAchievements,
  goals: screenGoals, settings: screenSettings,
};
let DATA = null;
let CURRENT = 'dashboard';

function renderSidebar(D) {
  const el = document.getElementById('sidebar');
  el.innerHTML =
    '<div class="logo-row"><span class="logo-mark">' +
    '<img src="assets/clive.png?v=1" alt="Clive">' +
    '</span><span style="display:flex;flex-direction:column;min-width:0;"><span class="logo-name">CLIVE</span>' +
    '<span class="logo-sub">' + esc((D.profile.firstName || '').toUpperCase()) + '’S BUILD</span></span></div>' +
    NAV.map((g) =>
      '<div class="nav-group"><div class="nav-group-title">' + esc(g.title) + '</div><div class="nav-items">' +
      g.items.map((it) => '<div class="nav-item' + (CURRENT === it[0] ? ' active' : '') + '" data-nav="' + it[0] + '">' + icon(it[2]) + '<span>' + esc(it[1]) + '</span></div>').join('') +
      '</div></div>').join('') +
    '<div class="sidebar-foot"><div class="kbd-hint">Press <span class="kbd">1–6</span> to switch screens</div>' +
    '<div class="me-row">' + avatarHTML(D.profile.firstName || '·', 34) +
    '<div style="min-width:0;"><div style="font-size:13px;font-weight:700;color:var(--text-strong);">' + esc(D.profile.firstName || '') + '</div>' +
    '<div style="font-size:11px;color:var(--text-muted);">Body recomposition</div></div></div></div>';
}
function render() {
  const D = derive(DATA);
  renderSidebar(D);
  const main = document.getElementById('main');
  const fn = SCREENS[CURRENT];
  const NAMES = { checkin: "Today's check-in", workout: 'Workout', history: 'Workout history', library: 'Exercise library', measurements: 'Measurements', nutrition: 'Nutrition', achievements: 'Achievements', goals: 'Goals', settings: 'Settings' };
  main.innerHTML = fn ? fn(D) : screenPlaceholder(NAMES[CURRENT] || CURRENT);
  bindCharts(main);
  main.focus && main.focus({ preventScroll: true });
  window.scrollTo(0, 0);
}
function go(screen) {
  CURRENT = SCREENS[screen] ? screen : 'dashboard';
  if (location.hash !== '#' + CURRENT) { try { history.replaceState(null, '', '#' + CURRENT); } catch (e) {} }
  document.body.classList.remove('nav-open');
  render();
}
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-nav]');
  if (t) { go(t.dataset.nav); return; }
});
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#', '');
  if (h && h !== CURRENT) go(h);
});
window.addEventListener('keydown', (e) => {
  if (/INPUT|TEXTAREA|SELECT/.test((e.target && e.target.tagName) || '')) return;
  const map = { 1: 'dashboard', 2: 'workout', 3: 'weight', 4: 'strength', 5: 'nutrition', 6: 'coach' };
  if (map[e.key] && DATA) go(map[e.key]);
});
document.getElementById('burger').addEventListener('click', () => document.body.classList.toggle('nav-open'));
document.getElementById('backdrop').addEventListener('click', () => document.body.classList.remove('nav-open'));

function renderError(err) {
  document.getElementById('main').innerHTML =
    '<div class="placeholder-wrap"><div class="placeholder-card">' +
    '<span class="ph-icon">' + icon('activity', 22) + '</span>' +
    '<div style="font-size:20px;font-weight:800;color:var(--text-strong);margin-bottom:8px;">Couldn’t load fitness-data.json</div>' +
    '<div style="font-size:13.5px;line-height:1.7;color:var(--text-secondary);text-align:left;">' +
    'The dashboard reads everything from <span style="font-family:var(--font-mono);color:var(--brand);">fitness-data.json</span> next to this file.<br><br>' +
    '• If you opened index.html directly (file://), browsers block the fetch — serve the folder instead:<br>' +
    '<span style="font-family:var(--font-mono);font-size:12px;background:var(--surface-sunken);border-radius:6px;padding:2px 6px;">python3 -m http.server</span> then open <span style="font-family:var(--font-mono);font-size:12px;">http://localhost:8000</span><br><br>' +
    '• If the file exists, check it’s valid JSON.<br><br>' +
    '<span style="color:var(--text-muted);font-size:12px;">' + esc(err && err.message ? err.message : err) + '</span></div></div></div>';
}

// ---------- boot ----------
(function boot() {
  const h = location.hash.replace('#', '');
  if (h) CURRENT = h;
  fetch('fitness-data.json?t=' + Date.now())
    .then((r) => { if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching fitness-data.json'); return r.json(); })
    .then((json) => { DATA = json; go(CURRENT); })
    .catch((err) => renderError(err));
})();
</script>
</body>
</html>
